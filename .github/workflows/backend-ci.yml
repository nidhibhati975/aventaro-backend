name: Backend CI

on:
  pull_request:
    paths:
      - "app/**"
      - "alembic/**"
      - "tests/**"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "alembic/**"
      - "tests/**"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: aventaro_test
          POSTGRES_USER: aventaro
          POSTGRES_PASSWORD: aventaro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aventaro -d aventaro_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Write CI environment
        run: |
          cat > .env <<'EOF'
          APP_ENV=staging
          ALLOW_PLACEHOLDER_CONFIG=true
          DATABASE_URL=postgresql://aventaro:aventaro@127.0.0.1:5432/aventaro_test
          REDIS_URL=redis://127.0.0.1:6379/0
          JWT_SECRET=development-placeholder-jwt-secret-change-before-launch
          JWT_ALGORITHM=HS256
          OPENAI_API_KEY=sk-development-placeholder-key-not-used
          CORS_ALLOWED_ORIGINS=http://localhost:8081
          EOF
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile backend
        run: python -m compileall app
      - name: Validate SQLAlchemy mappers
        run: |
          python - <<'PY'
          from sqlalchemy.orm import configure_mappers
          from app.main import app
          configure_mappers()
          print(app.title)
          PY
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: python -m pytest tests
      - name: Build backend image
        run: docker build -t aventaro-api:ci .
